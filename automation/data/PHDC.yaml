# ─────────────────────────────────────────────────────────────────────
# PHDC study inputs. EDIT THIS FILE ONLY — everything downstream regenerates.
# Every drift / probability / impact is an explicit, editable judgment.
# ─────────────────────────────────────────────────────────────────────
ticker: PHDC
name: Palm Hills Developments
exchange: EGX
currency: EGP

market:
  anchor: 14.50            # last close
  close_date: "2026-06-11"
  shares_bn: 2.86
  valuation_date: "2026-06-09"

valuation:
  sotp:                    # risk-adjusted EGP/share, already weighted
    - {label: "Contracted backlog",                  value: 7.25}
    - {label: "Badya — West Cairo (unsold)",          value: 0.83}
    - {label: "Saadiyat Shores — Abu Dhabi (45% JV)", value: 3.55}
    - {label: "Ras El-Hekma — Miran (45% JV)",        value: 2.32}
    - {label: "Ras El-Hekma — Modon (30% JV)",        value: 1.18}
    - {label: "Hacienda series — North Coast",        value: 0.86}
    - {label: "Jirian + other active compounds",      value: 2.42}
    - {label: "Landbank + terminal value (5% g)",     value: 1.69}
  net_debt_per_share: 4.21   # reconciles SOTP rows (20.10) to published equity value 15.89
  full_execution: 24.92
  bear: 7.62

# 10-factor Monte Carlo. 5 continuous + 5 discrete events.
montecarlo:
  paths: 50000
  seed: 42
  horizons_days: [20, 60]
  realized_vol_annual: 0.50
  continuous:   # name, 3M drift, 3M vol
    - {name: "CBE policy rate path",  drift:  0.020, vol: 0.05}
    - {name: "EGP/USD exchange rate", drift: -0.025, vol: 0.07}
    - {name: "Inflation (CPI)",       drift:  0.015, vol: 0.04}
    - {name: "EGX30 & foreign flows", drift:  0.015, vol: 0.08}
    - {name: "Brent / Gulf liquidity",drift:  0.005, vol: 0.04}
  events:       # name, probability, mean impact, impact spread
    - {name: "Geopolitical / security",        prob: 0.30, impact: -0.12, spread: 0.05}
    - {name: "Ras El-Hekma sovereign inflows", prob: 0.35, impact:  0.10, spread: 0.04}
    - {name: "Project launch & sales",         prob: 0.55, impact:  0.08, spread: 0.04}
    - {name: "Tourism & North Coast demand",   prob: 0.40, impact:  0.02, spread: 0.06}
    - {name: "Mortgage finance & credit",      prob: 0.35, impact:  0.02, spread: 0.05}

touch_levels: [15.55, 16.50, 17.50, 18.50, 20.00]

# ─── Site block fields (drive assets/data.js → phdc.html) ───
site:
  spot: 14.50
  spot_date: "close 11 Jun 2026"
  resolve_t20: "2026-07-09"
  resolve_t60: "2026-09-03"
  levels:
    res: [16.08, 15.70, 15.00]
    sup: [14.49, 14.06, 13.90]
  tech:
    trend: "Correcting inside a longer uptrend"
    summary: "The price pulled back from its recent high and is now testing a rising floor. Momentum has cooled and the daily MACD is still negative, so the dip isn't over yet — but the bigger uptrend is intact, and the selling has come on fading volume rather than heavy panic."
    bull: "A daily close back above 15.00 would say the dip is done."
    bear: "A close below 13.90 would break the rising structure and open the door to 13.40."
  files:
    study: "files/PHDC_Valuation_Study_11-06-2026_public.docx?v=1106"
    model: "files/PHDC_Valuation_Study_11-06-2026_public.xlsx?v=1106"
    pdf:   "files/PHDC_Valuation_Study_11-06-2026_public.pdf?v=1106"

# Distribution as PUBLISHED in the 11 Jun study (kept byte-consistent with the
# downloadable PDF/Excel). The Monte-Carlo engine above reproduces these from
# the 10 factors to within ~0.02 EGP — validated, see automation/README.
published_dist:
  t20: {p5: 11.53, p25: 13.42, p50: 14.92, p75: 16.56, p95: 19.32}
  t60: {p5: 10.18, p25: 13.22, p50: 15.83, p75: 18.95, p95: 24.50}
published_touch:   # [level, T+20 %, T+60 %] descending
  - [20.00, 5, 30]
  - [18.50, 12, 44]
  - [17.50, 23, 55]
  - [16.50, 40, 68]
  - [15.55, 62, 81]

