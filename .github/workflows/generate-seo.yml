name: Generate SEO surfaces (sitemap + homepage links)

on:
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - 'assets/data.js'
      - 'assets/coverage.js'
      - 'scripts/generate_seo.js'
      - '.github/workflows/generate-seo.yml'
  workflow_dispatch: {}
  schedule:
    - cron: '23 5 * * *'   # daily safety net (05:23 UTC)

permissions:
  contents: write

concurrency:
  group: generate-seo
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so <lastmod> = real last-commit date per file
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate sitemap.xml and homepage studies strip
        run: node scripts/generate_seo.js
      - name: Commit regenerated files if they changed
        run: |
          CHANGED="$(git status --porcelain sitemap.xml index.html ar/index.html)"
          if [ -n "$CHANGED" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml index.html ar/index.html
            git commit -m "Auto-regenerate sitemap + homepage studies strip [skip ci]"
            git push
          else
            echo "sitemap/homepage already current — nothing to commit."
          fi
