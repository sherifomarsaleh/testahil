name: Generate RSS feed

on:
  push:
    branches: [ main ]
    paths:
      - 'assets/data.js'
      - 'scripts/generate_feed.js'
      - '.github/workflows/generate-feed.yml'
  workflow_dispatch: {}
  schedule:
    - cron: '17 5 * * *'   # daily safety net (05:17 UTC)

permissions:
  contents: write

concurrency:
  group: site-auto-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate feed.xml from data.js
        run: node scripts/generate_feed.js assets/data.js feed.xml
      - name: Commit feed.xml if it changed
        run: |
          if [ -n "$(git status --porcelain feed.xml)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add feed.xml
            git commit -m "Auto-regenerate feed.xml from data.js [skip ci]"
            for i in 1 2 3 4 5; do
              git fetch origin main
              git rebase origin/main && git push origin HEAD:main && break
              echo "push rejected (attempt $i) — retrying after rebase"
              sleep $((i * 5))
            done
          else
            echo "feed.xml unchanged — nothing to commit."
          fi
